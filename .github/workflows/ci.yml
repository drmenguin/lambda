name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev groff dpkg-dev

      - name: Build
        run: make -B

      - name: Test
        run: make check

      - name: Check staged install
        run: |
          make DESTDIR="$PWD/install-root" PREFIX=/usr install
          test -x install-root/usr/bin/lambda
          test -x install-root/usr/bin/lambda-cli
          test -f install-root/usr/share/man/man1/lambda.1
          test -f install-root/usr/share/man/man1/lambda-cli.1

      - name: Build Debian package
        run: |
          make deb
          test -f dist/lambda_*.deb
